<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[M6] 문경 에코월드 미션레이스</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        yamoija: '#1E3A8A', // Deep Navy
                        ecoworld: '#22C55E', // Green
                        bgLight: '#F3F4F6'
                    },
                    borderRadius: {
                        'xl': '1rem',
                        '2xl': '1.5rem',
                        '3xl': '2rem',
                    }
                }
            }
        }
    </script>
    <!-- React & Babel CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #E5E7EB;
        }
        .mobile-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #F3F4F6;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .modal-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        .pulse-animation { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .9; transform: scale(1.02); } }
        .rank-bar { transition: width 1s ease-out; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MISSION_DATA = [
            { id: 1, type: "[관찰/추리]", title: "응답하라 1960! 시크릿 암호 해독", location: "석탄박물관 & 사택촌 골목", desc: "옛 광부들의 마을에서 퀴즈 정답 찾아 모바일 입력", icon: "🕵️‍♂️", image: "images/mission1/thumb.png" },
            { id: 2, type: "[힐링/휴식]", title: "가은 모노레일 정상의 비밀", location: "모노레일 정상 하차장 (제1촬영장)", desc: "에코월드 전경을 감상하며 숨겨진 QR코드 스캔", icon: "🚠", image: "images/mission2/thumb.jpg" },
            { id: 3, type: "[협동/포토]", title: "조선시대 원근법 마술", location: "가은오픈세트장", desc: "사극 궁궐을 배경으로 코믹한 착시 단체 사진 촬영", icon: "📸", image: "images/mission3/thumb.jpg" },
            { id: 4, type: "[액티비티]", title: "무중력 에이전트 점프샷", location: "에코타운 자이언트 포레스트 잔디밭", desc: "조원 전체가 공중에 떠 있는 타이밍 점프샷 촬영", icon: "🏃‍♂️", image: "images/mission4/thumb.jpg" },
            { id: 5, type: "[탐색/명분]", title: "에코월드 간판 헌터", location: "거미열차 및 이동 동선 전역", desc: "이정표의 글자들을 사진으로 찍어 조합하여 인증", icon: "🔍", image: "images/mission5/thumb.jpg" }
        ];

        const RANKING_DATA = [
            { team: "1조", score: 1500, color: "bg-orange-500", max: 2000 },
            { team: "2조", score: 1200, color: "bg-blue-500", max: 2000 },
            { team: "3조", score: 900, color: "bg-indigo-500", max: 2000 }
        ];

        function App() {
            const [completedMissions, setCompletedMissions] = useState(new Set());
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isRankLoaded, setIsRankLoaded] = useState(false);

            useEffect(() => {
                setTimeout(() => setIsRankLoaded(true), 500);
            }, []);

            const allMissionsCompleted = completedMissions.size === MISSION_DATA.length;

            const toggleMission = (id) => {
                const next = new Set(completedMissions);
                if (next.has(id)) {
                    next.delete(id);
                } else {
                    next.add(id);
                }
                setCompletedMissions(next);
            };

            const handleImgError = (e) => {
                e.target.src = "https://via.placeholder.com/200x150?text=Mission";
            };

            return (
                <div className="mobile-container pb-32">
                    {/* Header & Sticky Ranking Section */}
                    <div className="sticky top-0 z-40 bg-bgLight">
                        <header className="bg-yamoija text-white px-5 py-5 rounded-b-[2rem] shadow-lg">
                            <div className="flex justify-between items-center mb-1">
                                <h1 className="text-xl font-black italic tracking-tighter">YAMOIZA</h1>
                                <span className="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold backdrop-blur-md">1조 접속중</span>
                            </div>
                            <p className="text-[11px] text-blue-200 font-bold flex items-center gap-1.5">
                                <span className="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
                                [M6] 문경 에코월드 미션레이스
                            </p>
                        </header>

                        {/* Ranking Card - Fixed style */}
                        <div className="px-5 py-4">
                            <section className="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                                <div className="flex justify-between items-center mb-3 px-1">
                                    <h2 className="text-sm font-black text-slate-800 flex items-center gap-1.5">
                                        🏆 실시간 순위
                                    </h2>
                                    <span className="text-[9px] font-black text-yamoija bg-yamoija/5 px-2 py-0.5 rounded-full uppercase">LIVE</span>
                                </div>
                                <div className="grid grid-cols-3 gap-3">
                                    {RANKING_DATA.map((rank, idx) => (
                                        <div key={idx} className="space-y-1">
                                            <div className="flex justify-between items-end text-[10px] font-bold px-0.5">
                                                <span className="text-slate-600 truncate">{idx + 1}위 {rank.team}</span>
                                            </div>
                                            <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                                <div 
                                                    className={`h-full ${rank.color} rounded-full rank-bar shadow-sm`}
                                                    style={{ width: isRankLoaded ? `${(rank.score / rank.max) * 100}%` : '0%' }}
                                                />
                                            </div>
                                            <div className="text-[9px] text-yamoija font-black italic text-right px-0.5">{rank.score}P</div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>

                    <main className="px-4 pb-10">
                        {/* Mission List - 2 Column Grid */}
                        <section className="space-y-4">
                            <h2 className="text-sm font-black text-slate-800 flex items-center justify-between px-1">
                                <span className="flex items-center gap-1.5">🎯 미션 현황</span>
                                <span className="text-[10px] font-bold text-slate-400 bg-white px-2 py-1 rounded-full shadow-sm">
                                    {completedMissions.size} / {MISSION_DATA.length} 완료
                                </span>
                            </h2>
                            <div className="grid grid-cols-2 gap-3">
                                {MISSION_DATA.map((mission) => (
                                    <div key={mission.id} className={`bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 flex flex-col transition-all duration-300 active:scale-95 ${completedMissions.has(mission.id) ? 'opacity-70 bg-slate-50' : ''}`}>
                                        <div className="relative h-28 overflow-hidden">
                                            <img 
                                                src={mission.image} 
                                                alt={mission.title} 
                                                onError={handleImgError}
                                                className={`w-full h-full object-cover transition-all duration-500 ${completedMissions.has(mission.id) ? 'grayscale contrast-75' : ''}`} 
                                            />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent" />
                                            <div className="absolute top-2 left-2 bg-yamoija/90 text-white px-1.5 py-0.5 rounded-md text-[8px] font-black backdrop-blur-sm">
                                                {mission.type}
                                            </div>
                                            {completedMissions.has(mission.id) && (
                                                <div className="absolute inset-0 flex items-center justify-center bg-black/20">
                                                    <span className="text-3xl drop-shadow-lg">✅</span>
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-3 flex flex-col flex-1">
                                            <h3 className="font-black text-[12px] mb-1 line-clamp-2 leading-tight text-slate-800 min-h-[2.4em]">
                                                {mission.icon} {mission.title}
                                            </h3>
                                            <p className="text-[9px] font-bold text-slate-400 mb-3 truncate italic flex items-center gap-0.5">
                                                <span className="shrink-0">📍</span> {mission.location}
                                            </p>
                                            
                                            <button 
                                                onClick={() => toggleMission(mission.id)}
                                                className={`w-full py-2.5 rounded-xl text-[10px] font-black transition-all duration-300 flex items-center justify-center gap-1 shadow-md ${
                                                    completedMissions.has(mission.id) 
                                                    ? 'bg-slate-200 text-slate-500 border border-slate-300 shadow-none' 
                                                    : 'bg-yamoija text-white shadow-yamoija/20 active:bg-blue-900'
                                                }`}
                                            >
                                                {completedMissions.has(mission.id) ? '미션완료' : '수행하기'}
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* Sticky Footer Button */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto p-5 bg-gradient-to-t from-bgLight via-bgLight/90 to-transparent pt-10 z-40 text-center">
                        <button 
                            disabled={!allMissionsCompleted}
                            onClick={() => setIsModalOpen(true)}
                            className={`w-full py-4 rounded-3xl text-sm font-black shadow-2xl transition-all duration-500 transform ${
                                allMissionsCompleted 
                                ? 'bg-ecoworld text-white pulse-animation active:scale-95 shadow-ecoworld/40' 
                                : 'bg-slate-300 text-slate-500 cursor-not-allowed opacity-80'
                            }`}
                        >
                            {allMissionsCompleted ? (
                                <span className="flex items-center justify-center gap-2 tracking-tight">🚩 최종 집결지 확인하기</span>
                            ) : (
                                <span className="text-[11px] font-bold tracking-tight">모든 미션 완료 시 집결지가 공개됩니다</span>
                            )}
                        </button>
                    </div>

                    {/* Result Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 modal-overlay">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center shadow-2xl relative overflow-hidden animate-in fade-in zoom-in duration-300">
                                <div className="absolute top-0 right-0 w-24 h-24 bg-ecoworld/10 rounded-full blur-3xl -mr-8 -mt-8" />
                                
                                <div className="text-5xl mb-5 drop-shadow-md">🏆</div>
                                <h2 className="text-2xl font-black text-slate-900 mb-4 tracking-tighter">MISSION<br/>COMPLETED!</h2>
                                <div className="space-y-3 mb-6">
                                    <p className="text-slate-500 text-[11px] font-bold">축하합니다! 모든 미션을 수행했습니다.</p>
                                    <div className="bg-slate-50 p-5 rounded-3xl border-2 border-dashed border-ecoworld/30">
                                        <p className="text-[10px] text-slate-400 mb-1 font-black uppercase tracking-widest">Final Destination</p>
                                        <p className="text-slate-800 font-black text-base leading-snug">
                                            [에코월드 정문 옆 매표소]에 있는<br/>
                                            <span className="text-ecoworld underline decoration-ecoworld/30 decoration-4 underline-offset-4">운영인력</span>을 찾아주세요!
                                        </p>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => setIsModalOpen(false)}
                                    className="w-full py-4 bg-yamoija text-white rounded-2xl font-black shadow-xl shadow-yamoija/30 transition-transform active:scale-95 text-sm"
                                >
                                    확인
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
